name: Release Drafter

on:
  push:
    branches: [main]
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  update-draft:
    name: Update release draft
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.release-drafter.outputs.id }}
      tag-name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - id: release-drafter
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  draft-assets:
    name: Build and upload draft release assets
    runs-on: ubuntu-latest
    needs: update-draft
    if: needs.update-draft.outputs.tag-name != ''
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check whether build assets need refreshing
        id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(cmd/|internal/|tests/|go\.mod$|go\.sum$|\.github/workflows/release(-drafter)?\.yml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          go-version: "1.25"
          cache: true

      - name: Install Windows cross-compile toolchain
        if: steps.changes.outputs.changed == 'true'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Download dependencies
        if: steps.changes.outputs.changed == 'true'
        run: go mod tidy && go mod download

      - name: Set release version
        if: steps.changes.outputs.changed == 'true'
        id: version
        env:
          TAG_NAME: ${{ needs.update-draft.outputs.tag-name }}
        run: |
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build readsync-service.exe
        if: steps.changes.outputs.changed == 'true'
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -v -trimpath \
            -ldflags="-X github.com/readsync/readsync/internal/version.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/readsync-service.exe ./cmd/readsync-service/

      - name: Build readsyncctl.exe
        if: steps.changes.outputs.changed == 'true'
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -v -trimpath \
            -ldflags="-X github.com/readsync/readsync/internal/version.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/readsyncctl.exe ./cmd/readsyncctl/

      - name: Build readsync-tray.exe
        if: steps.changes.outputs.changed == 'true'
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
          CC: x86_64-w64-mingw32-gcc
        run: |
          go build -v -trimpath \
            -ldflags="-H windowsgui -X github.com/readsync/readsync/internal/version.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/readsync-tray.exe ./cmd/readsync-tray/

      - name: Create release archive and checksums
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd dist
          zip "ReadSync-${{ steps.version.outputs.TAG_NAME }}-windows-amd64.zip" \
            readsync-service.exe readsyncctl.exe readsync-tray.exe
          sha256sum *.zip *.exe > SHA256SUMS.txt
          rm ./*.exe

      - name: Upload draft release assets
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.TAG_NAME }}" dist/*.zip dist/SHA256SUMS.txt --clobber
