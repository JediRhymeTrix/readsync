{{define "content"}}
<h1>Activity Log</h1>

<p>Recent meaningful events (redacted). Showing the last {{.Limit}} entries.</p>

{{if .Entries}}
<table class="rs-table rs-activity">
    <thead><tr>
        <th>When</th><th>Source</th><th>Book</th><th>%</th><th>Status</th>
    </tr></thead>
    <tbody>
    {{range .Entries}}
    <tr>
        <td>{{.ReceivedAt}}</td>
        <td>{{.Source}}</td>
        <td>{{.BookTitle}}</td>
        <td>{{.Percent}}</td>
        <td>{{.ReadStatus}}</td>
    </tr>
    {{end}}
    </tbody>
</table>
{{else}}
<p class="rs-empty">No recent activity.</p>
{{end}}
{{end}}
